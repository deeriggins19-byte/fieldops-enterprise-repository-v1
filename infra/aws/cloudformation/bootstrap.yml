AWSTemplateFormatVersion: '2010-09-09'
Description: FieldOps ECS bootstrap stack for GitHub Actions deploys

Parameters:
  GitHubOwner:
    Type: String
    Default: deeriggins19-byte
  GitHubRepo:
    Type: String
    Default: fieldops-enterprise-repository-v1
  EcrApiRepositoryName:
    Type: String
    Default: fieldops-api
  EcrWebRepositoryName:
    Type: String
    Default: fieldops-web
  EcsClusterName:
    Type: String
    Default: fieldops-prod
  EcsApiServiceName:
    Type: String
    Default: fieldops-api-service
  EcsWebServiceName:
    Type: String
    Default: fieldops-web-service
  DatabaseUrlSecretName:
    Type: String
    Default: fieldops/prod/database-url
  RedisUrlSecretName:
    Type: String
    Default: fieldops/prod/redis-url
  JwtSecretSecretName:
    Type: String
    Default: fieldops/prod/jwt-secret
  WebPublicApiUrl:
    Type: String
    Default: https://<api-domain>

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActionsFieldOpsDeploy
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOwner}/${GitHubRepo}:ref:refs/heads/main
      Policies:
        - PolicyName: GitHubActionsFieldOpsDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: EcrAuth
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: EcrPushPull
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                  - ecr:BatchGetImage
                  - ecr:DescribeRepositories
                  - ecr:DescribeImages
                  - ecr:ListImages
                Resource:
                  - !GetAtt ApiRepository.Arn
                  - !GetAtt WebRepository.Arn
              - Sid: EcsDeploy
                Effect: Allow
                Action:
                  - ecs:RegisterTaskDefinition
                  - ecs:UpdateService
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:ListTasks
                Resource: '*'
              - Sid: PassRoles
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !GetAtt EcsExecutionRole.Arn
                  - !GetAtt EcsTaskRole.Arn
              - Sid: ReadSecrets
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Ref DatabaseUrlSecret
                  - !Ref RedisUrlSecret
                  - !Ref JwtSecretSecret
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: '*'

  ApiRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref EcrApiRepositoryName
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256

  WebRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref EcrWebRepositoryName
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256

  FieldOpsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref EcsClusterName

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /fieldops/api
      RetentionInDays: 30

  WebLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /fieldops/web
      RetentionInDays: 30

  EcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ecsTaskExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ecsTaskRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FieldOpsTaskSecretsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Ref DatabaseUrlSecret
                  - !Ref RedisUrlSecret
                  - !Ref JwtSecretSecret

  DatabaseUrlSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref DatabaseUrlSecretName
      Description: FieldOps production database URL

  RedisUrlSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref RedisUrlSecretName
      Description: FieldOps production Redis URL

  JwtSecretSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref JwtSecretSecretName
      Description: FieldOps production JWT secret

Outputs:
  GitHubActionsRoleArn:
    Description: ARN to use in AWS_ROLE_TO_ASSUME
    Value: !GetAtt GitHubActionsDeployRole.Arn
  ApiRepositoryName:
    Value: !Ref ApiRepository
  WebRepositoryName:
    Value: !Ref WebRepository
  EcsClusterName:
    Value: !Ref FieldOpsCluster
  EcsExecutionRoleArn:
    Value: !GetAtt EcsExecutionRole.Arn
  EcsTaskRoleArn:
    Value: !GetAtt EcsTaskRole.Arn
  DatabaseUrlSecretArn:
    Value: !Ref DatabaseUrlSecret
  RedisUrlSecretArn:
    Value: !Ref RedisUrlSecret
  JwtSecretArn:
    Value: !Ref JwtSecretSecret
