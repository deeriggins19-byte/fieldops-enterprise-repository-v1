AWSTemplateFormatVersion: '2010-09-09'
Description: FieldOps ECS service stack for API and web

Parameters:
  ClusterName:
    Type: String
  ApiRepositoryUri:
    Type: String
  WebRepositoryUri:
    Type: String
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  ApiSecretsDatabaseUrlArn:
    Type: String
  ApiSecretsRedisUrlArn:
    Type: String
  ApiSecretsJwtSecretArn:
    Type: String
  WebPublicApiUrl:
    Type: String
  ContainerSecurityGroupCidr:
    Type: String
    Default: 0.0.0.0/0

Resources:
  ApiLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: fieldops-api-alb
      Scheme: internet-facing
      Type: application
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup

  WebLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: fieldops-web-alb
      Scheme: internet-facing
      Type: application
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound HTTP traffic
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref ContainerSecurityGroupCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow ALB to reach tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  ApiTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: fieldops-api-tg
      Port: 3001
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP

  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: fieldops-web-tg
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /login
      HealthCheckProtocol: HTTP

  ApiListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ApiTargetGroup
      LoadBalancerArn: !Ref ApiLoadBalancer
      Port: 80
      Protocol: HTTP

  WebListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup
      LoadBalancerArn: !Ref WebLoadBalancer
      Port: 80
      Protocol: HTTP

  ApiTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: fieldops-api
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Sub arn:aws:iam::${AWS::AccountId}:role/ecsTaskExecutionRole
      TaskRoleArn: !Sub arn:aws:iam::${AWS::AccountId}:role/ecsTaskRole
      ContainerDefinitions:
        - Name: api
          Image: !Ref ApiRepositoryUri
          PortMappings:
            - ContainerPort: 3001
          Environment:
            - Name: API_PORT
              Value: '3001'
            - Name: JWT_EXPIRES_IN
              Value: 12h
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Ref ApiSecretsDatabaseUrlArn
            - Name: REDIS_URL
              ValueFrom: !Ref ApiSecretsRedisUrlArn
            - Name: JWT_SECRET
              ValueFrom: !Ref ApiSecretsJwtSecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /fieldops/api
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: api

  WebTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: fieldops-web
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Sub arn:aws:iam::${AWS::AccountId}:role/ecsTaskExecutionRole
      TaskRoleArn: !Sub arn:aws:iam::${AWS::AccountId}:role/ecsTaskRole
      ContainerDefinitions:
        - Name: web
          Image: !Ref WebRepositoryUri
          PortMappings:
            - ContainerPort: 3000
          Environment:
            - Name: NEXT_PUBLIC_API_URL
              Value: !Ref WebPublicApiUrl
            - Name: EXPO_PUBLIC_API_URL
              Value: !Ref WebPublicApiUrl
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /fieldops/web
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: web

  ApiService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: fieldops-api-service
      Cluster: !Ref ClusterName
      DesiredCount: 1
      LaunchType: FARGATE
      TaskDefinition: !Ref ApiTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ServiceSecurityGroup
          Subnets: !Ref PublicSubnetIds
      LoadBalancers:
        - ContainerName: api
          ContainerPort: 3001
          TargetGroupArn: !Ref ApiTargetGroup

  WebService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: fieldops-web-service
      Cluster: !Ref ClusterName
      DesiredCount: 1
      LaunchType: FARGATE
      TaskDefinition: !Ref WebTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ServiceSecurityGroup
          Subnets: !Ref PublicSubnetIds
      LoadBalancers:
        - ContainerName: web
          ContainerPort: 3000
          TargetGroupArn: !Ref WebTargetGroup

Outputs:
  ApiLoadBalancerDnsName:
    Value: !GetAtt ApiLoadBalancer.DNSName
  WebLoadBalancerDnsName:
    Value: !GetAtt WebLoadBalancer.DNSName
  ApiServiceName:
    Value: !Ref ApiService
  WebServiceName:
    Value: !Ref WebService
