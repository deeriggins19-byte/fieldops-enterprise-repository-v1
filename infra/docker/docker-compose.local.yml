services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fieldops
      POSTGRES_PASSWORD: fieldops
      POSTGRES_DB: fieldops
    ports:
      - "5432:5432"
    volumes:
      - fieldops_pg:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  fieldops_pg:
